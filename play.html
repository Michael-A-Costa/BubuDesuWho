<body class="no-overflow">

<div id="sidebar" class="sidebar-collapsed">
  <!-- @include partials/sidebar-nav.html -->
  <img id="song-cover" src="" alt="" decoding="async" fetchpriority="high" style="display:none">
</div>

<div class="main">
  <span id="menu-button" class="glyphicon glyphicon-menu-hamburger" aria-hidden="true"></span>

  <!-- Song header -->
  <nav class="navbar song-header">
    <div id="song-controls">
      <div id="jquery_jplayer_1" class="jp-jplayer"></div>

      <!-- Row 1: centered song title -->
      <div class="song-title-row">
        <h2 id="song-title"></h2>
            <div class="song-title-utils">
              <button id="theme-toggle" type="button" class="btn btn-default" title="Switch to light mode">&#9790;</button>
              <button id="palette-toggle" type="button" class="btn btn-default" title="Switch to official color palette">🎨</button>
              <button id="lyrics-button" type="button" class="btn btn-default">Lyrics</button>
              <a id="lyrics-jp-toggle" type="button" class="btn btn-default" title="Japanese lyrics" style="display: none">JP</a>
              <span class="kofi-button-wrap">
                <button id="kofi-button" type="button" title="Support on Ko-fi"><img src="https://storage.ko-fi.com/cdn/cup-border.png" alt="Ko-fi"></button>
                <button id="kofi-dismiss" type="button" title="Hide until reload" aria-label="Hide Ko-fi button">×</button>
              </span>
        </div>
      </div>

      <!-- Row 2: game controls -->
      <div class="button-area">
        <div id="misc-controls">
          <button id="check" type="button" class="btn btn-success">Check</button>
          <button id="reset" type="button" class="btn btn-default">Reset</button>
          <button id="autoscroll" type="button" class="btn btn-default active">Autoscroll</button>
          <button id="themed" type="button" class="btn btn-default active">Themed</button>
          <button id="global-hints" type="button" class="btn btn-default" title="Show singer count for each line">Hints</button>
          <button id="global-inline" type="button" class="btn btn-default" title="Show lyric snippet inside each slot">Inline</button>
          <button id="global-reveal" type="button" class="btn btn-default default">Reveal</button>
          <button id="global-reveal-off" type="button" class="btn btn-default active">Reveal</button>
          <button id="edit-toggle" type="button" class="btn btn-default" title="Toggle Edit Mode"><span class="glyphicon glyphicon-pencil"></span> Edit</button>
        </div>
        <div id="game-settings">
          <button id="diff" type="button" class="btn btn-success">Normal</button>
          <div class="label label-info meter"></div>
            <div class="full-combo-banner" aria-hidden="true">
              <div class="full-combo-text">FULL COMBO</div>
            </div>
        </div>
        <div id="lyrics-menu">
          <a id="lyrics-dl-ass" class="btn btn-default" title="Download lyrics as ASS"><span class="glyphicon glyphicon-align-right" aria-hidden="true"></span> Download</a>
          <a id="lyrics-enable-calls-sfx" type="button" class="btn btn-default" title="Call sound effects" style="display: none"><span class="glyphicon glyphicon-bullhorn" aria-hidden="true"></span> SFX</a>
          <a id="lyrics-enable-calls" type="button" class="btn btn-default" title="Call lines" style="display: none"><span class="glyphicon glyphicon-bullhorn" aria-hidden="true"></span> Calls</a>
        </div>
      </div>
    </div>
  </nav>

  <div id="game-area" class="container-fluid"><div class="row">
    <div id="slots-container" class="col-xs-12">
      <div id="slots">
      </div>
      <div style="height: 30%"></div>
    </div>
    <div id="lyrics-container">
      <div id="lyrics">
        <div id="lyrics-left" class="lyrics-col"></div>
        <div id="lyrics-right" class="lyrics-col"></div>
      </div>
      <div style="height: 30%"></div>
    </div>
  </div></div>

</div>

<!-- Fixed bottom player bar (Spotify-style) -->
<div id="player-bar">
  <div id="jp_container_1">
    <div class="jp-gui">
      <div class="player-core">
        <button type="button" class="jp-play btn btn-custom"><span class="glyphicon glyphicon-play" aria-hidden="true"></span></button>
        <button type="button" class="jp-pause btn btn-custom"><span class="glyphicon glyphicon-pause" aria-hidden="true"></span></button>
        <button type="button" class="jp-stop btn btn-custom" style="display:none"><span class="glyphicon glyphicon-stop" aria-hidden="true"></span></button>
        <div id="progress-slider" style="display:inline-block;height:8px;border-radius:2px;margin-left:14px;position:relative;vertical-align:middle;cursor:pointer">
          <div id="progress-bar" style="height:100%;border-radius:4px;width:0%;pointer-events:none"></div>
          <div id="seek-tooltip" style="display:none;position:absolute;bottom:100%;left:0;transform:translateX(-50%);margin-bottom:6px;padding:2px 6px;background:rgba(0,0,0,0.85);color:#fff;font-size:1em;border-radius:3px;white-space:nowrap;pointer-events:none"></div>
        </div>
        <div class="jp-current-time" style="display:inline-block;font-size:1.2em;margin:0 12px">0:00</div>
      </div>
      <div class="player-vol">
        <button type="button" class="jp-mute btn btn-custom"><span class="glyphicon glyphicon-volume-down" aria-hidden="true"></span></button>
        <input id="volume-slider" type="range" min="0" max="100" value="30">
      </div>
      <div class="jp-no-solution">
        You must have an HTML5-compliant browser to play!
      </div>
    </div>
  </div>
</div>

<div id="kofi-modal" hidden>
  <div class="kofi-modal-content">
    <button class="kofi-modal-close" type="button" aria-label="Close">×</button>

</div>
