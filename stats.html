<!DOCTYPE html>
<html lang="en-US">
<head>

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fb96be">

<script>try{if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark-mode')}catch(e){}</script>

<title>BubuDesuWho - Stats</title>

<link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
<link rel="icon" type="image/png" href="favicon-16x16.png" sizes="16x16">
<link type="text/css" href="css/bootstrap.min.css" rel="stylesheet" />
<link type="text/css" href="css/styles.css?ver=20170312" rel="stylesheet" />
<link rel="preconnect" href="https://github.com">
<link rel="preconnect" href="https://objects.githubusercontent.com">

</head>
<body>

<div id="sidebar" class="sidebar-collapsed">
  <!-- @include partials/sidebar-nav.html -->
</div>

<div class="main">
  <span id="menu-button" class="glyphicon glyphicon-menu-hamburger" aria-hidden="true"></span>

  <nav class="navbar navbar-default">
  <div class="container">
  <div class="row"><div class="col-xs-10 col-xs-offset-2 col-sm-11 col-sm-offset-1 navbar-title-row">
      <h1 class="dia-red">Stats</h1>
      <button id="theme-toggle" type="button" class="btn btn-default" title="Switch to light mode">&#9790;</button>
  </div></div>
  </div>
  </nav>

  <div class="container"><div class="row"><div class="col-xs-12 stats-page">

    <section id="stats-empty" class="stats-empty hidden">
      <p class="stats-empty-quote">"You haven't played anything yet."</p>
      <p class="stats-empty-cta">
        <a id="stats-empty-link" href="play.html" class="btn btn-primary btn-lg">Play a random song&nbsp;→</a>
      </p>
    </section>

    <div id="stats-body">

      <header class="stats-ribbon">
        <div class="stat-cell">
          <span class="stat-num" id="stat-plays">0</span>
          <span class="stat-label">Plays</span>
        </div>
        <span class="stat-rule" aria-hidden="true"></span>
        <div class="stat-cell">
          <span class="stat-num" id="stat-accuracy">0%</span>
          <span class="stat-label">Lines correct</span>
        </div>
        <span class="stat-rule" aria-hidden="true"></span>
        <div class="stat-cell">
          <span class="stat-num" id="stat-streak">0</span>
          <span class="stat-label">Streak</span>
        </div>
      </header>

      <section id="mastery-section" class="stats-section">
        <h2 class="stats-section-title">Member Mastery <span class="stats-section-hint">— of the lines you tried, % you got right</span></h2>
        <div id="member-mastery" class="member-strip"></div>
      </section>

      <section id="total-mastery-section" class="stats-section">
        <h2 class="stats-section-title">Total Mastery <span class="stats-section-hint">— of every line they sang, % you got right</span></h2>
        <div id="total-mastery" class="member-strip"></div>
      </section>

      <section class="stats-section">
        <h2 class="stats-section-title">Setlist</h2>
        <div id="setlist-filters" class="setlist-filters"></div>
        <ul id="setlist" class="setlist" data-filter="all"></ul>
      </section>

      <section id="untried-section" class="stats-section">
        <h2 class="stats-section-title">Songs you haven't tried</h2>
        <ul id="untried-list" class="untried-list"></ul>
      </section>

    </div>

  </div></div></div>
</div>

<script type="module" src="/src/main.ts"></script>
<script>
  if (!('ontouchstart' in window) && !(navigator.msMaxTouchPoints > 0)) {
    document.documentElement.classList.add('hoverable');
  }
</script>
</body>
</html>
